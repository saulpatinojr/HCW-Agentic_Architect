name: CI - Matrix Build (Windows)

on:
  push:
    branches: [ main ]
    paths:
      - src/**
      - tests/**
  pull_request:
    branches: [ main ]
    paths:
      - src/**
      - tests/**
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        dotnet-version: [ '8.0.x' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build src/HCWMauiApp/WorkspaceManager.csproj -f net10.0-windows10.0.19041.0 --configuration Release --no-restore
      - name: Test
        run: dotnet test src/HCWMauiApp.Tests/HCWMauiApp.Tests.csproj --configuration Release --no-build --verbosity minimal
