name: Deploy Team ZIPs to Pages

on:
  push:
    branches: ["main"]
    # Only trigger if changes happen in the teams folder
    paths:
      - 'teams/**'
  # Allows you to run this workflow manually from the Actions tab if needed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify team ZIPs exist
        run: |
          set -euo pipefail
          if [ ! -d "teams" ]; then
            echo "Expected teams/ directory was not found."
            exit 1
          fi
          shopt -s nullglob
          zips=(teams/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "No ZIP files found in teams/."
            exit 1
          fi

      - name: Stage ZIPs for Pages artifact
        run: |
          set -euo pipefail
          mkdir -p pages-artifact
          cp teams/*.zip pages-artifact/
          ls -1 pages-artifact
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish only ZIP assets from /teams at the Pages root URL.
          path: './pages-artifact'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4